apiVersion: apps/v1
kind: Deployment
metadata:
  name: borrow-service
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: borrow-service
  template:
    metadata:
      labels:
        app: borrow-service
    spec:
      containers:
        - name: borrow-service
          image: ss880/mynewapp1:borrowimage
          ports:
            - containerPort: 5002
